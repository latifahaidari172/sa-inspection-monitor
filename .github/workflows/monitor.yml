name: SA Inspection Booking Monitor

on:
  schedule:
    - cron: '*/5 * * * *'    # every 5 minutes, 24/7
    - cron: '30 7 * * *'     # 5:00pm Adelaide time daily summary
  workflow_dispatch:
    inputs:
      force_daily_summary:
        description: 'Force daily summary email? (true/false)'
        required: false
        default: 'false'

jobs:
  check-booking:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dateutil

      - name: Set daily summary flag
        run: |
          if [ "${{ github.event.schedule }}" = "30 7 * * *" ] || [ "${{ github.event.inputs.force_daily_summary }}" = "true" ]; then
            echo "DAILY_SUMMARY=true" >> $GITHUB_ENV
          else
            echo "DAILY_SUMMARY=false" >> $GITHUB_ENV
          fi

      - name: Run booking monitor
        env:
          LICENCE_NUMBER:      ${{ secrets.LICENCE_NUMBER }}
          DATE_OF_BIRTH:       ${{ secrets.DATE_OF_BIRTH }}
          LAST_NAME:           ${{ secrets.LAST_NAME }}
          GMAIL_ADDRESS:       ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:        ${{ secrets.NOTIFY_EMAIL }}
          DAILY_SUMMARY:       ${{ env.DAILY_SUMMARY }}
        run: python monitor.py

      - name: Save results.csv back to repository
        if: always()
        run: |
          git config user.name  "SA Monitor Bot"
          git config user.email "monitor@noreply.github.com"
          git add results.csv
          git diff --staged --quiet || git commit -m "Update results [skip ci]"
          git push
