name: SA Inspection Booking Monitor

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes, 24/7
  workflow_dispatch:

jobs:
  check-booking:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dateutil

      - name: Run booking monitor
        env:
          LICENCE_NUMBER:      ${{ secrets.LICENCE_NUMBER }}
          DATE_OF_BIRTH:       ${{ secrets.DATE_OF_BIRTH }}
          LAST_NAME:           ${{ secrets.LAST_NAME }}
          GMAIL_ADDRESS:       ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:        ${{ secrets.NOTIFY_EMAIL }}
        run: python monitor.py

      - name: Save results.csv back to repository
        if: always()
        run: |
          git config user.name  "SA Monitor Bot"
          git config user.email "monitor@noreply.github.com"
          git add results.csv
          git diff --staged --quiet || git commit -m "Update results [skip ci]"
          git push
