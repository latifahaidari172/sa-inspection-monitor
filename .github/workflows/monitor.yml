name: SA Inspection Booking Monitor

on:
  schedule:
    - cron: '0,10,20,30,40,50 21,22,23 * * *'
    - cron: '0,10,20,30,40,50 0,1,2,3,4,5,6 * * *'
    - cron: '0,10,20,30 7 * * *'
  workflow_dispatch:

jobs:
  check-booking:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable

      - name: Install Python dependencies
        run: |
          pip install selenium requests python-dateutil

      - name: Run booking monitor
        env:
          LICENCE_NUMBER:      ${{ secrets.LICENCE_NUMBER }}
          DATE_OF_BIRTH:       ${{ secrets.DATE_OF_BIRTH }}
          LAST_NAME:           ${{ secrets.LAST_NAME }}
          GMAIL_ADDRESS:       ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:        ${{ secrets.NOTIFY_EMAIL }}
        run: python monitor.py

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_number }}
          path: screenshots/
          if-no-files-found: ignore

      - name: Upload results CSV
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ github.run_number }}
          path: results.csv
          if-no-files-found: ignore
